version: '3.8'

services:
  postgres_db:
    image: postgres:15-alpine
    container_name: stash_postgres
    environment:
      POSTGRES_USER: stash_admin
      POSTGRES_PASSWORD: stash_secure_password123
      POSTGRES_DB: stash_ledger
    ports:
      - "5432:5432"
    volumes:
      - stash_db_data:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  stash_db_data:
    driver: local
